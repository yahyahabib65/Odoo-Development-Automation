# Ephemeral Odoo 17.0 + PostgreSQL 16 for module validation
# Usage: MODULE_PATH=/path/to/module MODULE_NAME=module_name docker compose up
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  odoo:
    image: odoo:17
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ${MODULE_PATH:-.}:/mnt/extra-addons/${MODULE_NAME:-module}:ro
    configs:
      - source: odoo_conf
        target: /etc/odoo/odoo.conf

configs:
  odoo_conf:
    file: ./odoo.conf
